<style>
:root {

}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 12px;background:#10161e;border-bottom:1px solid #26303b;z-index:5}
h1{font-size:16px;margin:0 0 8px}
.controls{display:grid;grid-template-columns:1fr auto auto;gap:8px}
input,button,select{font:inherit;border-radius:10px;border:1px solid #354150;background:#18212b;color:var(--text);padding:10px}
button{font-weight:700}
#viewport{position:relative;flex:1;overflow:hidden;touch-action:none;background:
radial-gradient(circle at 50% 40%,#18202a 0,#0c1117 70%)}
#stage{position:absolute;left:50%;top:50%;transform-origin:0 0}
svg{width:650px;height:950px;display:block;filter:drop-shadow(0 10px 30px #000)}
.fuse rect,.relay rect,.breaker rect{stroke-width:2;vector-effect:non-scaling-stroke}
.fuse text,.relay text,.breaker text{fill:white;font-weight:800;font-size:11px;text-anchor:middle;pointer-events:none}
.fuse{cursor:pointer}
.fuse.highlight rect{stroke:#fff;stroke-width:5}
.fuse.dim{opacity:.12}
.relay rect{fill:#323943;stroke:#8f9aaa}
.breaker rect{fill:#5a3d62;stroke:#cc9ce0}
#legend{position:absolute;left:10px;bottom:10px;background:#111923e8;border:1px solid #334050;border-radius:12px;padding:8px;max-width:210px;font-size:11px;display:none}
#legend.open{display:block}
.legend-row{display:flex;gap:7px;align-items:center;margin:4px 0}
.swatch{width:13px;height:13px;border-radius:3px;flex:none}
#details{position:fixed;left:0;right:0;bottom:0;background:#111923f5;border-top:1px solid #3a4654;padding:14px 16px 18px;transform:translateY(105%);transition:.2s;z-index:10;max-height:46vh;overflow:auto}
#details.open{transform:none}
#details h2{margin:0 0 4px;font-size:22px}
#details .meta{color:var(--muted);font-size:13px;margin-bottom:10px}
#details .function{font-size:17px;line-height:1.35}
.badge{display:inline-block;border-radius:999px;padding:4px 8px;margin:8px 6px 0 0;background:#26313e;font-size:12px}
.warn{background:#5b311f}
.close{float:right;padding:7px 10px}
.note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.35}
#tip{position:absolute;right:10px;bottom:10px;padding:8px 10px;background:#111923d9;border-radius:10px;font-size:11px;color:var(--muted)}
@media (min-width:800px){header{padding:12px 20px} h1{font-size:19px}}
</style>

  t.textContent=text; group.appendChild(t);
}
for(const f of fuses){
  const g=document.createElementNS(ns,"g"); g.classList.add("fuse"); g.dataset.id=f.id;
  const r=document.createElementNS(ns,"rect");
  r.setAttribute("x",f.x);r.setAttribute("y",f.y);r.setAttribute("width",f.w);r.setAttribute("height",f.h);
  r.setAttribute("rx",Math.min(6,f.h/4));r.setAttribute("fill",colors[f.category]||"#555");
  r.setAttribute("stroke",f.critical?"#ffd2c7":"#91a0b2");
  g.appendChild(r);
  makeText(g,f.x+f.w/2,f.y+f.h/2+4,f.id,Math.max(8,Math.min(12,f.w/3.5)));
  g.addEventListener("click",()=>showDetails(f));
  fuseLayer.appendChild(g);
}
for(const o of relays){
  const g=document.createElementNS(ns,"g"); g.classList.add("relay");
  const r=document.createElementNS(ns,"rect"); Object.entries({x:o.x,y:o.y,width:o.w,height:o.h,rx:8}).forEach(([k,v])=>r.setAttribute(k,v));
  g.appendChild(r); makeText(g,o.x+o.w/2,o.y+o.h/2+4,o.id,14); relayLayer.appendChild(g);
}
for(const o of breakers){
  const g=document.createElementNS(ns,"g"); g.classList.add("breaker");
  const r=document.createElementNS(ns,"rect"); Object.entries({x:o.x,y:o.y,width:o.w,height:o.h,rx:8}).forEach(([k,v])=>r.setAttribute(k,v));
  g.appendChild(r); makeText(g,o.x+o.w/2,o.y+o.h/2+4,o.id,12); breakerLayer.appendChild(g);
}

const detail=document.getElementById("details");
function showDetails(f){
  document.querySelectorAll(".fuse").forEach(x=>x.classList.toggle("highlight",x.dataset.id===f.id));
  document.getElementById("detailId").textContent=f.id;
  document.getElementById("detailMeta").textContent=[f.amps||"Amperage not listed",categories[f.category]||f.category].join(" · ");
  document.getElementById("detailFunction").textContent=f.function;
  document.getElementById("detailBadges").innerHTML=
    (f.critical?'<span class="badge warn">Critical circuit</span>':'<span class="badge">Accessory/noncritical</span>')+
    '<span class="badge">Ignition off before removal</span>';
  detail.classList.add("open");
}
document.getElementById("close").onclick=()=>detail.classList.remove("open");

const legend=document.getElementById("legend");
legend.innerHTML=Object.entries(categories).filter(([k])=>k!=="empty").map(([k,v])=>
  `<div class="legend-row"><span class="swatch" style="background:${colors[k]}"></span>${v}</div>`
).join("")+'<div class="legend-row"><span class="swatch" style="background:#363d46"></span>Not populated</div>';
document.getElementById("legendBtn").onclick=()=>legend.classList.toggle("open");

const search=document.getElementById("search");
search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  for(const el of document.querySelectorAll(".fuse")){
    const f=fuses.find(x=>x.id===el.dataset.id);
    const match=!q || (`${f.id} ${f.amps} ${f.function} ${categories[f.category]||""}`).toLowerCase().includes(q);
    el.classList.toggle("dim",!match);
  }
  if(q){
    const hits=fuses.filter(f=>(`${f.id} ${f.amps} ${f.function}`).toLowerCase().includes(q));
    if(hits.length===1) showDetails(hits[0]);
  }
});

// touch/mouse pan and zoom
const viewport=document.getElementById("viewport"), stage=document.getElementById("stage");
let scale=.72, tx=-325*.72, ty=-475*.72, pointers=new Map(), lastDist=0, lastMid=null;
function fit(){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  scale=Math.min(vw/680,vh/980)*.95;
  tx=-325*scale; ty=-475*scale;
  render();
}
function render(){
  stage.style.transform=`translate(${viewport.clientWidth/2+tx}px,${viewport.clientHeight/2+ty}px) scale(${scale})`;
}
viewport.addEventListener("pointerdown",e=>{viewport.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});});
viewport.addEventListener("pointermove",e=>{
  if(!pointers.has(e.pointerId))return;
  const prev=pointers.get(e.pointerId); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  const pts=[...pointers.values()];
  if(pts.length===1){tx+=e.clientX-prev.x;ty+=e.clientY-prev.y;}
  else if(pts.length===2){
    const [a,b]=pts, dist=Math.hypot(a.x-b.x,a.y-b.y), mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    if(lastDist){const ratio=dist/lastDist; scale=Math.max(.25,Math.min(4,scale*ratio));}
    if(lastMid){tx+=mid.x-lastMid.x;ty+=mid.y-lastMid.y;}
    lastDist=dist;lastMid=mid;
  }
  render();
});
function end(e){pointers.delete(e.pointerId); if(pointers.size<2){lastDist=0;lastMid=null;}}
viewport.addEventListener("pointerup",end);viewport.addEventListener("pointercancel",end);
viewport.addEventListener("wheel",e=>{e.preventDefault();scale=Math.max(.25,Math.min(4,scale*(e.deltaY<0?1.12:.89)));render();},{passive:false});
document.getElementById("reset").onclick=()=>{search.value="";document.querySelectorAll(".fuse").forEach(x=>x.classList.remove("dim","highlight"));detail.classList.remove("open");fit();};
window.addEventListener("resize",fit); fit();
</script>
</body>
</html>
